{% extends 'base.html' %}

{% block title %}Tags — MegaZoomQuilt{% endblock %}

{% block content %}
<div class="page-layout">

  <aside class="sidebar">
    <p class="sidebar-count">{{ tags|length }} tags</p>
    <hr>
    <ul class="sidebar-list">
      {% for tag, count in tags %}
      <li>
        <a href="{{ url_for('tag_view', tag=tag) }}">#{{ tag }}</a>
        <span style="color:#aaa; font-size:0.78rem;"> {{ count }}</span>
      </li>
      {% endfor %}
    </ul>
  </aside>

  <main>
    <h2 style="margin:0 0 1rem; font-size:1.1rem; font-weight:600;">Tag cloud</h2>
    <div class="tag-cloud">
      {% for tag, count in tags %}
      <a class="tag" href="{{ url_for('tag_view', tag=tag) }}"
         style="font-size: {{ min_size + (max_size - min_size) * (count - min_count) / ((max_count - min_count) or 1) }}rem;">
        #{{ tag }} <span style="opacity:0.6; font-size:0.8em;">{{ count }}</span>
      </a>
      {% endfor %}
    </div>
  </main>

</div>
{% endblock %}
