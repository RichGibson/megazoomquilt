{% extends 'base.html' %}

{% block content %}
<style>
  .qr-wrap {
    max-width: 480px;
    margin: 3rem auto;
  }
  .qr-wrap h2 { margin-bottom: 1.25rem; }
  .qr-form { display: flex; gap: 0.5rem; }
  .qr-form input[type=url] {
    flex: 1;
    padding: 0.45rem 0.7rem;
    font-size: 0.95rem;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  .qr-form button {
    padding: 0.45rem 1rem;
    background: #0077cc;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.95rem;
  }
  .qr-form button:hover { background: #005fa3; }
  .qr-result {
    margin-top: 2rem;
    text-align: center;
  }
  .qr-result img {
    width: 240px;
    height: 240px;
    display: block;
    margin: 0 auto 0.75rem;
    border: 1px solid #ddd;
    padding: 8px;
    background: #fff;
  }
  .qr-dest {
    font-size: 0.8rem;
    color: #666;
    word-break: break-all;
    margin-bottom: 0.75rem;
  }
  .qr-download {
    display: inline-block;
    padding: 0.35rem 0.9rem;
    background: #444;
    color: #fff;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.85rem;
  }
  .qr-download:hover { background: #222; }
</style>

<div class="qr-wrap">
  <h2>QR Code Generator</h2>
  <form class="qr-form" method="post">
    <input type="url" name="url" placeholder="https://example.com"
           value="{{ dest }}" required autofocus>
    <button type="submit">Generate</button>
  </form>

  {# Result #}
  {% if qr_data_url %}
  <div class="qr-result">
    <img src="{{ qr_data_url }}" alt="QR code for {{ dest }}">
    <div class="qr-dest">→ {{ dest }}</div>
    <a class="qr-download" href="{{ qr_data_url }}" download="qrcode.png">Download PNG</a>
  </div>
  {% elif request.method == 'POST' %}
  <p style="color:#c44;margin-top:1rem">Please enter a valid http:// or https:// URL.</p>
  {% endif %}
</div>
{% endblock %}
